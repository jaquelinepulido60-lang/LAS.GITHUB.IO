<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Las Del Puerto | Inicio</title>
    <style>
        :root {
            --ancla-oro: #d4af37;
            --azul-marino: #1a2a6c;
            --blanco-arena: #f4f4f4;
            --carbon: #222;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--blanco-arena);
            color: var(--carbon);
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1571091718767-18b5b1457add?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
            padding: 100px 20px;
        }

        .cta-button {
            display: inline-block;
            background: var(--ancla-oro);
            color: var(--carbon);
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 20px;
        }

        nav {
            background: var(--azul-marino);
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="menu.html">Menú</a>
        <a href="contacto.html">Contacto</a>
    </nav>

    <header id="inicio">
        <h1>⚓ LAS DEL PUERTO ⚓</h1>
        <img src="imagenes/LOGO.JPG" alt="Logo Las Del Puerto" class="logo-header" width="200" height="200">
        <p>Sabor que viene de alta mar. Las hamburguesas más grandes del muelle.</p>
        <a href="menu.html" class="cta-button">Ver el Menú</a>
    </header>

</body>
</html>
